name: fitsy
description: "AI 기반 옷장 관리 및 코디 추천 앱"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_bloc: ^8.1.6
  get_it: ^8.0.3
  injectable: ^2.5.0
  dartz: ^0.10.1
  equatable: ^2.0.7
  cloud_firestore: ^5.6.5
  firebase_core: ^3.12.1
  firebase_storage: ^12.4.4
  firebase_auth: ^5.5.4
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1
  go_router: ^15.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  bloc_test: ^9.1.7
  mockito: ^5.4.5
  build_runner: ^2.4.14
  injectable_generator: ^2.7.0
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
